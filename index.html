<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Routes — Medieval Investment Game</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
:root {
  --parchment: #f4e8c1;
  --parchment-dark: #e6d5a8;
  --ink: #2c1810;
  --ink-light: #5a3a28;
  --gold: #c5a035;
  --gold-bright: #e8c84a;
  --gold-dark: #8a6d1b;
  --red-wax: #8b2500;
  --red-wax-light: #b33a1a;
  --ocean-blue: #1a4a6e;
  --desert-tan: #c4a35a;
  --silk-purple: #6b2d5b;
  --med-teal: #1a6b5a;
  --vault-gray: #5a5a5a;
  --shadow: rgba(44,24,16,0.3);
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Crimson Text’, Georgia, serif;
background: #1a1008;
color: var(–ink);
min-height: 100vh;
}

/* Parchment texture via CSS */
.parchment-bg {
background:
radial-gradient(ellipse at 20% 50%, rgba(196,163,90,0.1) 0%, transparent 50%),
radial-gradient(ellipse at 80% 20%, rgba(139,37,0,0.05) 0%, transparent 50%),
linear-gradient(180deg, #f4e8c1 0%, #ede0b5 40%, #e6d5a8 100%);
position: relative;
}

.parchment-bg::before {
content: ‘’;
position: absolute;
inset: 0;
background: url(“data:image/svg+xml,%3Csvg width=‘200’ height=‘200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence baseFrequency=‘0.65’ numOctaves=‘3’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.04’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
}

.parchment-bg > * { position: relative; z-index: 1; }

/* Border decoration */
.page-border {
border: 3px solid var(–gold-dark);
outline: 1px solid var(–gold);
outline-offset: 4px;
margin: 12px;
min-height: calc(100vh - 24px);
padding: 30px 40px;
}

@media (max-width: 768px) {
.page-border { margin: 6px; padding: 16px; }
}

/* TYPOGRAPHY */
h1, h2, h3 { font-family: ‘Cinzel’, serif; }

h1 {
font-size: 2.4rem;
font-weight: 900;
color: var(–red-wax);
text-align: center;
letter-spacing: 0.08em;
text-transform: uppercase;
margin-bottom: 4px;
text-shadow: 1px 1px 0 rgba(197,160,53,0.3);
}

.subtitle {
text-align: center;
font-family: ‘Cinzel’, serif;
font-size: 1rem;
color: var(–gold-dark);
letter-spacing: 0.15em;
margin-bottom: 24px;
}

h2 {
font-size: 1.5rem;
font-weight: 700;
color: var(–ink);
margin-bottom: 12px;
border-bottom: 2px solid var(–gold);
padding-bottom: 6px;
display: inline-block;
}

h3 {
font-size: 1.15rem;
font-weight: 600;
margin-bottom: 6px;
}

/* DIVIDER */
.divider {
display: flex;
align-items: center;
gap: 12px;
margin: 24px 0;
}
.divider::before, .divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: linear-gradient(90deg, transparent, var(–gold-dark), transparent);
}
.divider-icon {
font-size: 1.2rem;
color: var(–gold-dark);
}

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; }

/* SETUP SCREEN */
.setup-panel {
max-width: 560px;
margin: 0 auto;
background: rgba(255,255,255,0.25);
border: 1px solid var(–gold);
border-radius: 4px;
padding: 28px;
}

.setup-panel label {
font-family: ‘Cinzel’, serif;
font-weight: 600;
font-size: 0.95rem;
display: block;
margin-bottom: 6px;
color: var(–ink-light);
}

.group-config {
display: flex;
align-items: center;
gap: 12px;
margin-bottom: 20px;
}

.group-config input[type=“number”] {
width: 70px;
padding: 8px 12px;
font-family: ‘Cinzel’, serif;
font-size: 1.1rem;
font-weight: 700;
text-align: center;
border: 2px solid var(–gold-dark);
border-radius: 3px;
background: var(–parchment);
color: var(–ink);
}

.group-names-list {
margin-bottom: 20px;
}

.group-name-row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 8px;
}

.group-name-row span {
font-family: ‘Cinzel’, serif;
font-weight: 600;
font-size: 0.85rem;
min-width: 70px;
color: var(–ink-light);
}

.group-name-row input {
flex: 1;
padding: 6px 10px;
font-family: ‘Crimson Text’, serif;
font-size: 1rem;
border: 1px solid var(–gold);
border-radius: 3px;
background: rgba(255,255,255,0.5);
color: var(–ink);
}

/* BUTTONS */
.btn {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 0.95rem;
letter-spacing: 0.05em;
padding: 10px 28px;
border: 2px solid var(–gold-dark);
border-radius: 3px;
cursor: pointer;
transition: all 0.2s;
text-transform: uppercase;
}

.btn-primary {
background: linear-gradient(180deg, var(–gold-bright), var(–gold-dark));
color: #fff;
text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}
.btn-primary:hover {
background: linear-gradient(180deg, #f0d55a, var(–gold));
transform: translateY(-1px);
box-shadow: 0 3px 8px var(–shadow);
}

.btn-secondary {
background: var(–parchment);
color: var(–ink);
}
.btn-secondary:hover {
background: var(–parchment-dark);
}

.btn-danger {
background: var(–red-wax);
color: #fff;
border-color: var(–red-wax);
}
.btn-danger:hover {
background: var(–red-wax-light);
}

.btn-sm {
padding: 6px 16px;
font-size: 0.8rem;
}

.btn-row {
display: flex;
gap: 12px;
justify-content: center;
flex-wrap: wrap;
margin-top: 20px;
}

/* SCENARIO HEADER */
.scenario-header {
text-align: center;
margin-bottom: 20px;
}

.scenario-header h2 {
display: block;
border-bottom: none;
padding-bottom: 0;
font-size: 1.8rem;
color: var(–red-wax);
}

.scenario-era {
font-family: ‘Cinzel’, serif;
font-size: 0.95rem;
color: var(–gold-dark);
letter-spacing: 0.1em;
}

/* COMPANY CARDS */
.company-cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
gap: 16px;
margin-bottom: 24px;
}

.company-card {
background: rgba(255,255,255,0.3);
border: 2px solid var(–gold);
border-radius: 4px;
padding: 18px;
position: relative;
transition: box-shadow 0.2s;
}
.company-card:hover {
box-shadow: 0 2px 12px var(–shadow);
}

.company-card.vault-card {
border-style: dashed;
background: rgba(90,90,90,0.06);
}

.card-ticker {
position: absolute;
top: 12px;
right: 14px;
font-family: ‘Cinzel’, serif;
font-weight: 900;
font-size: 0.85rem;
letter-spacing: 0.1em;
padding: 2px 8px;
border-radius: 3px;
}

.ticker-srcc { background: var(–silk-purple); color: #fff; }
.ticker-iosi { background: var(–ocean-blue); color: #fff; }
.ticker-shdv { background: var(–desert-tan); color: var(–ink); }
.ticker-medi { background: var(–med-teal); color: #fff; }
.ticker-vault { background: var(–vault-gray); color: #fff; }

.card-company-name {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 1.05rem;
color: var(–ink);
margin-bottom: 8px;
padding-right: 60px;
}

.card-analysis {
font-size: 0.95rem;
line-height: 1.5;
color: var(–ink-light);
font-style: italic;
}

/* ALLOCATION TABLE */
.allocation-section {
margin-bottom: 24px;
}

.alloc-table-wrap {
overflow-x: auto;
-webkit-overflow-scrolling: touch;
}

table.alloc-table {
width: 100%;
border-collapse: collapse;
font-size: 0.95rem;
}

table.alloc-table th {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 0.8rem;
letter-spacing: 0.05em;
text-transform: uppercase;
padding: 8px 6px;
background: var(–ink);
color: var(–parchment);
text-align: center;
white-space: nowrap;
}

table.alloc-table th:first-child {
text-align: left;
padding-left: 12px;
}

table.alloc-table td {
padding: 6px;
text-align: center;
border-bottom: 1px solid rgba(197,160,53,0.3);
}

table.alloc-table td:first-child {
text-align: left;
padding-left: 12px;
font-family: ‘Cinzel’, serif;
font-weight: 600;
font-size: 0.9rem;
white-space: nowrap;
}

table.alloc-table tr:nth-child(even) {
background: rgba(255,255,255,0.2);
}

table.alloc-table input[type=“number”] {
width: 58px;
padding: 5px 4px;
font-family: ‘Crimson Text’, serif;
font-size: 0.95rem;
text-align: center;
border: 1px solid var(–gold);
border-radius: 3px;
background: rgba(255,255,255,0.6);
color: var(–ink);
}

table.alloc-table input[type=“number”]:focus {
outline: none;
border-color: var(–red-wax);
box-shadow: 0 0 0 2px rgba(139,37,0,0.15);
}

.total-cell {
font-weight: 700;
font-family: ‘Cinzel’, serif;
}

.total-valid { color: #2a7a2a; }
.total-invalid { color: var(–red-wax); }

/* RESULTS PHASE */
.round-reveal {
text-align: center;
margin: 20px 0;
}

.round-number {
font-family: ‘Cinzel’, serif;
font-size: 1.3rem;
font-weight: 700;
color: var(–red-wax);
margin-bottom: 8px;
}

.multipliers-display {
display: flex;
justify-content: center;
gap: 14px;
flex-wrap: wrap;
margin-bottom: 16px;
}

.mult-chip {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
padding: 8px 14px;
border-radius: 4px;
border: 2px solid;
min-width: 70px;
}

.mult-chip-ticker {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 0.7rem;
letter-spacing: 0.08em;
}

.mult-chip-value {
font-family: ‘Cinzel’, serif;
font-weight: 900;
font-size: 1.3rem;
}

.mult-positive { border-color: #2a7a2a; background: rgba(42,122,42,0.08); color: #2a7a2a; }
.mult-negative { border-color: var(–red-wax); background: rgba(139,37,0,0.08); color: var(–red-wax); }
.mult-neutral { border-color: var(–vault-gray); background: rgba(90,90,90,0.06); color: var(–vault-gray); }

/* SCOREBOARD */
table.score-table {
width: 100%;
border-collapse: collapse;
font-size: 0.95rem;
}

table.score-table th {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 0.8rem;
letter-spacing: 0.05em;
text-transform: uppercase;
padding: 10px 8px;
background: var(–ink);
color: var(–parchment);
text-align: center;
}

table.score-table th:first-child { text-align: left; padding-left: 12px; }

table.score-table td {
padding: 8px;
text-align: center;
border-bottom: 1px solid rgba(197,160,53,0.3);
font-variant-numeric: tabular-nums;
}

table.score-table td:first-child {
text-align: left;
padding-left: 12px;
font-family: ‘Cinzel’, serif;
font-weight: 600;
}

table.score-table tr:nth-child(even) { background: rgba(255,255,255,0.2); }
table.score-table tr.rank-1 { background: rgba(197,160,53,0.15); }
table.score-table .money-up { color: #2a7a2a; font-weight: 700; }
table.score-table .money-down { color: var(–red-wax); font-weight: 700; }
table.score-table .money-same { color: var(–vault-gray); }

/* NAV */
.nav-bar {
display: flex;
justify-content: space-between;
align-items: center;
padding: 10px 0;
border-top: 1px solid var(–gold);
margin-top: 20px;
}

.nav-breadcrumb {
font-family: ‘Cinzel’, serif;
font-size: 0.8rem;
color: var(–gold-dark);
letter-spacing: 0.05em;
}

/* TEACHER CONTROLS */
.teacher-bar {
display: flex;
gap: 8px;
flex-wrap: wrap;
justify-content: center;
margin: 12px 0;
}

/* PHASE INDICATORS */
.phase-indicator {
text-align: center;
font-family: ‘Cinzel’, serif;
font-size: 0.85rem;
letter-spacing: 0.1em;
text-transform: uppercase;
color: var(–gold-dark);
margin-bottom: 16px;
padding: 6px;
border: 1px dashed var(–gold);
border-radius: 3px;
background: rgba(197,160,53,0.05);
}

/* EVENT NARRATIVE */
.event-narrative {
background: rgba(139,37,0,0.04);
border-left: 4px solid var(–red-wax);
padding: 14px 18px;
margin: 16px 0;
font-size: 1rem;
line-height: 1.6;
color: var(–ink);
font-style: italic;
}

.event-narrative strong {
font-style: normal;
color: var(–red-wax);
}

/* FINAL SCOREBOARD */
.final-podium {
display: flex;
justify-content: center;
gap: 20px;
margin: 20px 0;
flex-wrap: wrap;
}

.podium-place {
text-align: center;
padding: 16px 24px;
border: 3px solid var(–gold);
border-radius: 6px;
min-width: 140px;
}

.podium-place.first {
background: linear-gradient(180deg, rgba(232,200,74,0.2), rgba(197,160,53,0.1));
border-color: var(–gold-bright);
transform: scale(1.05);
}

.podium-rank {
font-family: ‘Cinzel’, serif;
font-size: 2rem;
font-weight: 900;
color: var(–gold-dark);
}

.podium-name {
font-family: ‘Cinzel’, serif;
font-weight: 700;
font-size: 1rem;
color: var(–ink);
margin: 4px 0;
}

.podium-amount {
font-family: ‘Crimson Text’, serif;
font-size: 1.1rem;
font-weight: 700;
color: var(–red-wax);
}

/* RESPONSIVE */
@media (max-width: 600px) {
h1 { font-size: 1.6rem; }
.company-cards { grid-template-columns: 1fr; }
.mult-chip { min-width: 60px; padding: 6px 10px; }
}

/* ANIMATED ROUND REVEAL */
.reveal-sequence {
display: flex;
flex-direction: column;
align-items: center;
gap: 0;
margin: 12px 0 20px;
}

.reveal-step {
display: flex;
align-items: center;
gap: 14px;
padding: 12px 20px;
border-radius: 6px;
opacity: 0;
transform: translateY(12px);
transition: opacity 0.5s ease, transform 0.5s ease;
width: 100%;
max-width: 560px;
border-bottom: 1px solid rgba(197,160,53,0.2);
}

.reveal-step.visible {
opacity: 1;
transform: translateY(0);
}

.reveal-step .mult-chip {
flex-shrink: 0;
}

.reveal-flavor {
font-family: ‘Crimson Text’, serif;
font-size: 1.05rem;
font-style: italic;
line-height: 1.4;
color: var(–ink-light);
flex: 1;
}

.reveal-step.step-positive { background: rgba(42,122,42,0.05); }
.reveal-step.step-negative { background: rgba(139,37,0,0.05); }
.reveal-step.step-neutral  { background: rgba(90,90,90,0.03); }

.reveal-step .reveal-flavor strong {
font-style: normal;
}

@keyframes pulse-gold {
0%,100% { box-shadow: 0 0 0 0 rgba(197,160,53,0); }
50% { box-shadow: 0 0 12px 4px rgba(197,160,53,0.3); }
}

.reveal-step.just-revealed {
animation: pulse-gold 0.8s ease;
}

.round-scoreboard-update {
margin-top: 12px;
padding: 10px 16px;
background: rgba(44,24,16,0.04);
border-radius: 4px;
font-family: ‘Cinzel’, serif;
font-size: 0.85rem;
color: var(–ink-light);
text-align: center;
opacity: 0;
transition: opacity 0.5s ease;
}
.round-scoreboard-update.visible { opacity: 1; }
</style>

</head>

<script>
// ============================================================
//  GAME DATA — Historically adjusted scenarios
// ============================================================
const STARTING_FUNDS = 10000;

const COMPANIES = [
  { id: 'srcc', ticker: 'SRCC', name: 'Silk Road Caravan Company' },
  { id: 'iosi', ticker: 'IOSI', name: 'Indian Ocean Shipping Inc.' },
  { id: 'shdv', ticker: 'SHDV', name: 'Sahara Desert Ventures' },
  { id: 'medi', ticker: 'MEDI', name: 'Mediterranean Sea Partners' },
  { id: 'vault', ticker: 'VAULT', name: 'The Vault' }
];

const SCENARIOS = [
  {
    title: 'Scenario 1 — The Golden Age',
    era: 'c. 750–900 CE · Tang Dynasty & Abbasid Caliphate',
    analyses: {
      srcc: `The Silk Road is thriving. The Tang Dynasty controls the eastern routes with well-maintained roads and fair taxation, while the Abbasid Caliphate has secured the western half. The Abbasids charge a tax called the jizya on non-Muslim merchants, but many Sogdian traders have converted to Islam, reducing their costs. With both empires stable and prosperous, overland trade between China and the Mediterranean is as safe and profitable as it has been in centuries. A strong investment with real growth potential.`,
      iosi: `Indian Ocean trade is growing but remains unpredictable. Arab and Persian merchants sail dhows between East Africa, India, and Southeast Asia using monsoon winds, but navigation is still imprecise. A successful voyage can bring enormous returns in spices, ivory, and gold — but storms, miscalculated winds, and unfamiliar coastlines mean some ships never return. This trade has real potential, but investors should expect volatility.`,
      shdv: `Crossing the Sahara remains extraordinarily dangerous. Without reliable caravan infrastructure, traders attempting the journey face extreme heat, limited water sources, and near-certain loss of goods. A few Berber traders have made it across with small quantities of gold and salt, proving the route is not impossible — but most expeditions end in disaster. Only the boldest (or most foolish) investors should consider this.`,
      medi: `The Mediterranean was once Rome's great trade highway, but those days are gone. Viking longships raid from the north, Islamic corsairs patrol from the south, and there is no single power strong enough to keep sea lanes safe. Merchants must hire their own protection, cutting deeply into profits. Some money can still be made in coastal trade between Byzantine ports and Italian towns, but the risks are considerable and returns are inconsistent.`,
      vault: `The Vault is always safe. You won't make money, but you won't lose it either.`
    },
    // Rounds represent unfolding events within the era
    rounds: [
      // R1: Trade routes open, early Tang stability
      { srcc: 1.20, iosi: 0.80, shdv: 0.10, medi: 1.05, vault: 1 },
      // R2: Abbasid golden age peaks, Indian Ocean monsoon season good
      { srcc: 1.35, iosi: 1.15, shdv: 0.15, medi: 0.90, vault: 1 },
      // R3: An Lushan Rebellion disrupts Tang trade temporarily
      { srcc: 0.85, iosi: 1.10, shdv: 0.80, medi: 1.10, vault: 1 },
      // R4: Recovery and expansion, lucky Saharan crossing
      { srcc: 1.30, iosi: 1.40, shdv: 1.20, medi: 1.05, vault: 1 },
      // R5: Viking raids intensify in Med, silk road stabilizes
      { srcc: 1.25, iosi: 0.75, shdv: 0.10, medi: 0.60, vault: 1 },
      // R6: End of era consolidation
      { srcc: 1.15, iosi: 1.20, shdv: 0.20, medi: 1.10, vault: 1 }
    ],

let state = {
  groups: [],          // { name: string, funds: number }
  currentScenario: 0,  // 0-3
  currentRound: -1,    // -1 = allocation phase, 0-5 = round reveals
  allocations: [],     // per scenario: [ { srcc:%, iosi:%, shdv:%, medi:%, vault:% } per group ]
  history: [],         // per scenario: [ [ funds after each round per group ] ]
  phase: 'setup'       // setup | allocate | reveal | scenarioEnd | gameEnd
};

// ============================================================
//  SETUP
// ============================================================
function updateGroupNames() {
  const count = Math.max(2, Math.min(12, parseInt(document.getElementById('group-count').value) || 6));
  document.getElementById('group-count').value = count;
  const list = document.getElementById('group-names-list');
  list.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const row = document.createElement('div');
    row.className = 'group-name-row';
    row.innerHTML = `<span>Group ${i+1}:</span><input type="text" id="gname-${i}" value="Group ${i+1}" maxlength="20">`;
    list.appendChild(row);
  }
}

function startGame() {
  const count = parseInt(document.getElementById('group-count').value) || 6;
  state.groups = [];
  for (let i = 0; i < count; i++) {
    const input = document.getElementById(`gname-${i}`);
    const name = input ? input.value.trim() || `Group ${i+1}` : `Group ${i+1}`;
    state.groups.push({ name, funds: STARTING_FUNDS });
  }
  state.currentScenario = 0;
  state.allocations = [];
  state.history = [];
  state.phase = 'allocate';
  showScreen('game-screen');
  renderScenario();
}

function resetGame() {
  state = { groups: [], currentScenario: 0, currentRound: -1, allocations: [], history: [], phase: 'setup' };
  showScreen('setup-screen');
  updateGroupNames();
}

// ============================================================
//  RENDERING
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderScenario() {
  const sc = SCENARIOS[state.currentScenario];
  state.currentRound = -1;
  state.phase = 'allocate';

  // Breadcrumb
  document.getElementById('game-breadcrumb').textContent =
    `Scenario ${state.currentScenario + 1} of ${SCENARIOS.length}`;

  // Phase indicator
  document.getElementById('phase-indicator').textContent = '📜 Read the Analyst Reports, then Allocate Your Funds';

  // Scenario header
  document.getElementById('scenario-header').innerHTML =
    `<h2>${sc.title}</h2><div class="scenario-era">${sc.era}</div>`;

  // Company cards
  const cardsEl = document.getElementById('company-cards');
  cardsEl.innerHTML = '';
  COMPANIES.forEach(c => {
    const analysis = sc.analyses[c.id];
    const isVault = c.id === 'vault';
    cardsEl.innerHTML += `
      <div class="company-card ${isVault ? 'vault-card' : ''}">
        <span class="card-ticker ticker-${c.id}">${c.ticker}</span>
        <div class="card-company-name">${c.name}</div>
        <div class="card-analysis">${analysis}</div>
      </div>`;
  });

  // Hide round elements
  document.getElementById('event-narrative').style.display = 'none';
  document.getElementById('round-reveal').style.display = 'none';

  // Show allocation
  renderAllocationTable();
  document.getElementById('allocation-section').style.display = 'block';

  // Scoreboard
  renderScoreboard();
  document.getElementById('scoreboard-section').style.display = 'block';

  // Teacher controls
  renderTeacherBar();
}

const TRADE_COMPANIES = COMPANIES.filter(c => c.id !== 'vault');

function renderAllocationTable() {
  const table = document.getElementById('alloc-table');
  let html = `<thead><tr>
    <th>Group</th>
    ${TRADE_COMPANIES.map(c => `<th>${c.ticker}</th>`).join('')}
    <th>Vault</th>
    <th>Total</th>
  </tr></thead><tbody>`;

  state.groups.forEach((g, gi) => {
    html += `<tr>
      <td>${g.name}</td>
      ${TRADE_COMPANIES.map(c => `<td><input type="number" min="0" max="100" value="0"
        id="alloc-${gi}-${c.id}"
        onchange="updateTotal(${gi})" oninput="updateTotal(${gi})"></td>`).join('')}
      <td class="vault-auto" id="vault-${gi}" style="font-weight:700;color:var(--vault-gray);">100%</td>
      <td class="total-cell total-valid" id="total-${gi}">100%</td>
    </tr>`;
  });

  html += '</tbody>';
  table.innerHTML = html;
}

function updateTotal(gi) {
  let sum = 0;
  TRADE_COMPANIES.forEach(c => {
    const val = Math.max(0, parseInt(document.getElementById(`alloc-${gi}-${c.id}`).value) || 0);
    sum += val;
  });
  const vaultPct = Math.max(0, 100 - sum);
  const cell = document.getElementById(`total-${gi}`);
  const vaultCell = document.getElementById(`vault-${gi}`);
  vaultCell.textContent = vaultPct + '%';
  if (sum > 100) {
    cell.textContent = sum + '%';
    cell.className = 'total-cell total-invalid';
    vaultCell.textContent = '—';
    vaultCell.style.color = 'var(--red-wax)';
  } else {
    cell.textContent = '100%';
    cell.className = 'total-cell total-valid';
    vaultCell.style.color = 'var(--vault-gray)';
  }
}

  const roundsRevealed = state.currentRound >= 0 ? state.currentRound + 1 : 0;

  let html = `<thead><tr><th>Group</th><th>Starting</th>`;
  for (let r = 0; r < roundsRevealed; r++) {
    html += `<th>Round ${r + 1}</th>`;
  }
  html += `<th>Current Funds</th></tr></thead><tbody>`;

  const scenarioHistory = state.history[state.currentScenario] || [];

  state.groups.forEach((g, gi) => {
    const startFunds = g.funds;
    html += `<tr><td>${g.name}</td><td>$${startFunds.toLocaleString('en-US', {maximumFractionDigits:0})}</td>`;

    for (let r = 0; r < roundsRevealed; r++) {
      const val = scenarioHistory[r] ? scenarioHistory[r][gi] : startFunds;
      html += `<td>$${val.toLocaleString('en-US', {maximumFractionDigits:0})}</td>`;
    }

    const current = roundsRevealed > 0 && scenarioHistory[roundsRevealed - 1]
      ? scenarioHistory[roundsRevealed - 1][gi] : startFunds;

    const cls = current > startFunds ? 'money-up' : current < startFunds ? 'money-down' : 'money-same';
    html += `<td class="${cls}">$${current.toLocaleString('en-US', {maximumFractionDigits:0})}</td>`;
    html += '</tr>';
  });

  html += '</tbody>';
  table.innerHTML = html;
}

function renderTeacherBar() {
  const bar = document.getElementById('teacher-bar');

  if (state.phase === 'allocate') {
    bar.innerHTML = `<button class="btn btn-primary" onclick="lockAllocations()">Lock Allocations & Begin Rounds</button>`;
  } else if (state.phase === 'reveal') {
    const roundNum = state.currentRound + 2; // next round to reveal
    const totalRounds = SCENARIOS[state.currentScenario].rounds.length;
    if (roundNum <= totalRounds) {
      bar.innerHTML = `<button class="btn btn-primary" onclick="revealNextRound()">Reveal Round ${roundNum}</button>`;
    } else {
      // All rounds revealed
      if (state.currentScenario < SCENARIOS.length - 1) {
        bar.innerHTML = `<button class="btn btn-primary" onclick="nextScenario()">Proceed to Scenario ${state.currentScenario + 2}</button>`;
      } else {
        bar.innerHTML = `<button class="btn btn-primary" onclick="showFinal()">View Final Results</button>`;
      }
    }
  }
}

// ============================================================
//  GAME LOGIC
// ============================================================
function lockAllocations() {
  const allocs = [];
  let valid = true;

  state.groups.forEach((g, gi) => {
    const a = {};
    let sum = 0;
    TRADE_COMPANIES.forEach(c => {
      const val = Math.max(0, parseInt(document.getElementById(`alloc-${gi}-${c.id}`).value) || 0);
      a[c.id] = val;
      sum += val;
    });
    if (sum > 100) {
      valid = false;
      document.getElementById(`total-${gi}`).style.color = 'var(--red-wax)';
      document.getElementById(`total-${gi}`).style.fontWeight = '900';
    }
    a.vault = Math.max(0, 100 - sum);
    allocs.push(a);
  });

  if (!valid) {
    alert('No group can allocate more than 100%. Reduce some investments so the total is 100% or less.');
    return;
  }

  // Save allocations
  state.allocations[state.currentScenario] = allocs;

  // Disable inputs
  document.querySelectorAll('#alloc-table input').forEach(inp => inp.disabled = true);

  // Initialize history for this scenario
  if (!state.history[state.currentScenario]) state.history[state.currentScenario] = [];

  state.phase = 'reveal';
  state.currentRound = -1;

  document.getElementById('phase-indicator').textContent = '🎲 Allocations Locked — Reveal Rounds to See Your Returns';

  revealNextRound();
}

let revealInProgress = false;

function revealNextRound() {
  if (revealInProgress) return;
  revealInProgress = true;

  state.currentRound++;
  const sc = SCENARIOS[state.currentScenario];
  const round = sc.rounds[state.currentRound];
  const flavors = sc.roundFlavors[state.currentRound];
  const allocs = state.allocations[state.currentScenario];

  // Calculate new funds for each group
  const roundResults = [];
  state.groups.forEach((g, gi) => {
    const prevFunds = state.currentRound === 0
      ? g.funds
      : state.history[state.currentScenario][state.currentRound - 1][gi];

    let newFunds = 0;
    COMPANIES.forEach(c => {
      const pct = allocs[gi][c.id] / 100;
      const invested = prevFunds * pct;
      newFunds += invested * round[c.id];
    });
    roundResults.push(Math.round(newFunds));
  });

  state.history[state.currentScenario][state.currentRound] = roundResults;

  // Show event narrative
  const narrativeEl = document.getElementById('event-narrative');
  narrativeEl.innerHTML = sc.roundEvents[state.currentRound];
  narrativeEl.style.display = 'block';

  // Build the sequential reveal HTML
  const revealEl = document.getElementById('round-reveal');
  revealEl.style.display = 'block';

  let revealHTML = `<div class="round-number">Round ${state.currentRound + 1}</div>`;
  revealHTML += `<div class="reveal-sequence" id="reveal-sequence">`;

  COMPANIES.forEach(c => {
    const m = round[c.id];
    const stepCls = m > 1 ? 'step-positive' : m < 1 ? 'step-negative' : 'step-neutral';
    const chipCls = m > 1 ? 'mult-positive' : m < 1 ? 'mult-negative' : 'mult-neutral';
    const flavor = flavors[c.id];
    revealHTML += `
      <div class="reveal-step ${stepCls}" id="rstep-${c.id}">
        <div class="mult-chip ${chipCls}">
          <span class="mult-chip-ticker">${c.ticker}</span>
          <span class="mult-chip-value">×${m.toFixed(2)}</span>
        </div>
        <div class="reveal-flavor">${flavor}</div>
      </div>`;
  });

  revealHTML += `</div>`;
  revealHTML += `<div class="round-scoreboard-update" id="round-score-msg">Ledger updated!</div>`;
  revealEl.innerHTML = revealHTML;

  // Hide teacher bar during animation
  document.getElementById('teacher-bar').innerHTML = '';

  // Scroll to narrative
  narrativeEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Animate each company reveal sequentially
  const companyIds = COMPANIES.map(c => c.id);
  const DELAY_PER_STEP = 1200;
  const INITIAL_DELAY = 800;

  companyIds.forEach((cid, idx) => {
    setTimeout(() => {
      const step = document.getElementById(`rstep-${cid}`);
      step.classList.add('visible', 'just-revealed');
      // Remove pulse after animation completes
      setTimeout(() => step.classList.remove('just-revealed'), 800);

      // After last company, show scoreboard update and teacher controls
      if (idx === companyIds.length - 1) {
        setTimeout(() => {
          document.getElementById('round-score-msg').classList.add('visible');

          // Update phase indicator
          const totalRounds = sc.rounds.length;
          if (state.currentRound + 1 >= totalRounds) {
            document.getElementById('phase-indicator').textContent =
              `✅ All Rounds Complete — ${state.currentScenario < SCENARIOS.length - 1 ? 'Proceed to Next Scenario' : 'View Final Results'}`;
            state.groups.forEach((g, gi) => {
              g.funds = roundResults[gi];
            });
          } else {
            document.getElementById('phase-indicator').textContent =
              `🎲 Round ${state.currentRound + 1} of ${totalRounds} Revealed`;
          }

          renderScoreboard();
          renderTeacherBar();
          revealInProgress = false;
        }, 600);
      }
    }, INITIAL_DELAY + idx * DELAY_PER_STEP);
  });
}

function nextScenario() {
  state.currentScenario++;
  renderScenario();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFinal() {
  showScreen('final-screen');

  // Rank groups by final funds
  const ranked = state.groups.map((g, i) => ({ name: g.name, funds: g.funds, idx: i }))
    .sort((a, b) => b.funds - a.funds);

  let html = '<div class="final-podium">';
  ranked.slice(0, 3).forEach((g, i) => {
    const medals = ['🥇', '🥈', '🥉'];
    html += `<div class="podium-place ${i === 0 ? 'first' : ''}">
      <div class="podium-rank">${medals[i]}</div>
      <div class="podium-name">${g.name}</div>
      <div class="podium-amount">$${g.funds.toLocaleString('en-US', {maximumFractionDigits:0})}</div>
    </div>`;
  });
  html += '</div>';

  html += '<div class="divider"><span class="divider-icon">&#9830;</span></div>';
  html += '<h2>Complete Standings</h2>';
  html += '<table class="score-table"><thead><tr><th>Rank</th><th>Group</th><th>Starting</th><th>Final</th><th>Return</th></tr></thead><tbody>';

  ranked.forEach((g, i) => {
    const ret = ((g.funds - STARTING_FUNDS) / STARTING_FUNDS * 100).toFixed(1);
    const cls = g.funds > STARTING_FUNDS ? 'money-up' : g.funds < STARTING_FUNDS ? 'money-down' : 'money-same';
    html += `<tr ${i === 0 ? 'class="rank-1"' : ''}>
      <td>${i + 1}</td>
      <td>${g.name}</td>
      <td>$${STARTING_FUNDS.toLocaleString()}</td>
      <td class="${cls}">$${g.funds.toLocaleString('en-US', {maximumFractionDigits:0})}</td>
      <td class="${cls}">${ret > 0 ? '+' : ''}${ret}%</td>
    </tr>`;
  });

  html += '</tbody></table>';

  // Historical summary
  html += `<div class="divider"><span class="divider-icon">&#9830;</span></div>`;
  html += `<div class="event-narrative">
    <strong>What Did We Learn?</strong> Over four centuries of medieval trade (c. 750–1350 CE), the most successful merchants were those who read historical conditions carefully, diversified their investments wisely, and adapted their strategy as the world changed around them. The Silk Road dominated the early centuries but was devastated by the Mongol conquests — only to be reborn under the Pax Mongolica. The Indian Ocean trade grew steadily as navigation technology improved. The trans-Saharan route went from near-impossible to enormously profitable as camels, organized caravans, and powerful West African empires transformed the desert crossing. And the Mediterranean evolved from a pirate-infested backwater to the commercial engine of a newly connected Europe. History rewards those who pay attention.
  </div>`;

  document.getElementById('final-content').innerHTML = html;
}
